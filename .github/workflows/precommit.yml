name: Pre-Commit Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile source
        run: python -m compileall src tests

      - name: Run fast tests
        run: python -m pytest -q tests/test_structure_smoke.py tests/test_parser.py tests/test_scraper.py
